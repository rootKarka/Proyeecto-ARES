spring.application.name=logica_spring

# =====================================================
# SERVIDOR — Puerto dinámico para Railway
# Railway inyecta $PORT automáticamente. En local usa 8080.
# =====================================================
server.port=${PORT:8080}

# =====================================================
# UMBRALES DE SENSORES (configurables sin recompilar)
# =====================================================

# GAS (en ppm)
ares.umbrales.gas.critico=300.0
ares.umbrales.gas.advertencia=150.0

# TEMPERATURA (en grados Celsius)
ares.umbrales.temperatura.emergencia=50.0
ares.umbrales.temperatura.advertencia=35.0

# SONIDO (en decibelios)
ares.umbrales.sonido.critico=80.0
ares.umbrales.sonido.info=65.0

# Historial: cantidad maxima de analisis a mantener en memoria
ares.historial.max-entries=50
